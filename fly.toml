app = "sells-research"
primary_region = "dfw"

[build]

[processes]
  worker = "temporal-worker geo"

[[vm]]
  size = "performance-4x"
  memory = "8gb"
  processes = ["worker"]

[checks]
  [checks.health]
    type = "http"
    port = 8080
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/health"
    processes = ["app"]
