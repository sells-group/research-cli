app = "sells-research"
primary_region = "dfw"

[build]

[env]
  RESEARCH_TEMPORAL_HOST_PORT = "sells-temporal.internal:7233"
  RESEARCH_TEMPORAL_NAMESPACE = "research-cli"

[processes]
  geo-worker = "temporal-worker geo"
  fedsync-worker = "temporal-worker fedsync"

[[vm]]
  size = "performance-4x"
  memory = "8gb"
  processes = ["geo-worker"]

[[vm]]
  size = "performance-2x"
  memory = "4gb"
  processes = ["fedsync-worker"]
